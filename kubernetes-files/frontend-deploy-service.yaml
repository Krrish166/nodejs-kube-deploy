apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/frontend:2
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata: 
  name: frontend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: arn:aws:acm:ap-south-1:811572529216:certificate/ca499027-8f32-49d1-8e8f-23be43b9a288
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: http
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
spec:
  ports:
  - port: 443
    targetPort: 80
    protocol: TCP
  selector:
    app: frontend
  type: LoadBalancer
